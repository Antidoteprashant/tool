<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Premium Image Format Converter - Convert your images to PNG, JPG, or WEBP easily and quickly.">
    <title>Premium Image Converter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>
    <div class="container fade-in">


        <div class="header-text">
            <h1>Image Converter</h1>
            <p>Fast, secure, and beautiful</p>
        </div>

        <button id="download-btn" class="btn primary-btn">Download Image</button>

        <div id="ad-section" class="ad-box">
            <div class="ad-content">
                <span class="ad-badge">Sponsored</span>
                <p>Support our platform</p>
                <small>Check out our premium features!</small>
            </div>
        </div>

        <div id="upload-container" class="upload-box hidden">
            <div class="upload-area">
                <span class="material-symbols-outlined upload-icon">cloud_upload</span>
                <h2>Choose an image</h2>
                <p class="upload-subtitle">Click to browse your files</p>
                <input type="file" id="file-upload" accept="image/*">
            </div>
            <div id="error-message" class="hidden error"></div>

            <div id="preview-container" class="hidden">
                <div class="image-wrapper">
                    <img id="preview-image" src="" alt="Image Preview">
                </div>
            </div>

            <div id="format-container" class="hidden format-section">
                <label for="format-select">Convert to</label>
                <div class="select-wrapper">
                    <select id="format-select" class="form-select">
                        <option value="image/png">PNG Format</option>
                        <option value="image/jpeg">JPG Format</option>
                        <option value="image/webp">WEBP Format</option>
                    </select>
                </div>
            </div>

            <button id="process-btn" class="btn action-btn hidden">
                <span>Process Image</span>
            </button>

            <div id="processing-status" class="hidden processing-section">
                <div class="spinner"></div>
                <h3 class="processing-text">Processing your image...</h3>
                <div id="timer" class="timer-display">10s</div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
